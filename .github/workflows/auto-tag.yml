name: Auto Tag

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get versions from all sources
        id: version
        run: |
          pkg=$(node -p "require('./package.json').version")
          cargo=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tauri=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "pkg=$pkg" >> $GITHUB_OUTPUT
          echo "cargo=$cargo" >> $GITHUB_OUTPUT
          echo "tauri=$tauri" >> $GITHUB_OUTPUT
          echo "package.json: $pkg"
          echo "Cargo.toml: $cargo"
          echo "tauri.conf.json: $tauri"

      - name: Check version consistency
        run: |
          if [ "${{ steps.version.outputs.pkg }}" != "${{ steps.version.outputs.cargo }}" ] || \
             [ "${{ steps.version.outputs.pkg }}" != "${{ steps.version.outputs.tauri }}" ]; then
            echo "::error::Version mismatch! package.json=${{ steps.version.outputs.pkg }} Cargo.toml=${{ steps.version.outputs.cargo }} tauri.conf.json=${{ steps.version.outputs.tauri }}"
            exit 1
          fi
          echo "All versions match: ${{ steps.version.outputs.pkg }}"

      - name: Check if version changed
        id: check
        run: |
          # Check if tag already exists
          if git rev-parse "v${{ steps.version.outputs.pkg }}" >/dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.pkg }} already exists, version not changed"
          else
            # Check if version files were modified in the triggering commit
            changed_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            if echo "$changed_files" | grep -qE "package.json|src-tauri/Cargo.toml|src-tauri/tauri.conf.json"; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Version files changed and tag v${{ steps.version.outputs.pkg }} is new"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "Version files not changed in this commit"
            fi
          fi

      - name: Create tag
        if: steps.check.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.version.outputs.pkg }}"
          git push origin "v${{ steps.version.outputs.pkg }}"
          echo "Created and pushed tag v${{ steps.version.outputs.pkg }}"
